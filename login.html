<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111827;
    font-family:Arial, sans-serif;
}

.container{
    background:white;
    width:350px;
    padding:40px;
    border-radius:14px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
    text-align:center;
}

h1{
    margin-bottom:25px;
    color:#111827;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.register-link{
    margin-top:18px;
    display:block;
    color:#2563eb;
    text-decoration:none;
}

.register-link:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

    <h1>Log In</h1>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="login()">
        Log-in
    </button>

    <a
        class="register-link"
        href="register.html"
    >
        Register
    </a>

</div>

<script>

const supabaseUrl =
"https://lgezvelexcoincoyfzhr.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZXp2ZWxleGNvaW5jb3lmemhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTk1NDQsImV4cCI6MjA5NDIzNTU0NH0.nppfcWnBeKguSGGNfq3ZBWgHp6P1r-ztuze2xlaCpas";

const supabaseClient =
window.supabaseClient.createClient(
    supabaseUrl,
    supabaseKey
);

async function login(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const { data, error } =
    await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if(error){

        alert(error.message);

        window.location.href =
        "register.html";

        return;
    }

    window.location.href =
    "https://openxp-automotive.github.io/";
}

// Auto redirect if already logged in
supabase.auth.getSession().then(
({ data }) => {

    if(data.session){

        window.location.href =
        "https://openxp-automotive.github.io/";
    }
});

</script>

</body>
</html>
