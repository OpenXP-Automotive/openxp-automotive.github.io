<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111827;
    font-family:Arial, sans-serif;
}

.container{
    background:white;
    width:350px;
    padding:40px;
    border-radius:14px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
    text-align:center;
}

h1{
    margin-bottom:25px;
    color:#111827;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#16a34a;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#15803d;
}
</style>
</head>

<body>

<div class="container">

    <h1>Register</h1>

    <input
        type="text"
        id="username"
        placeholder="Username"
    >

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="register()">
        Register
    </button>

</div>

<script>

const supabaseUrl =
"https://lgezvelexcoincoyfzhr.supabase.co";

const supabaseKey =
"
eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZXp2ZWxleGNvaW5jb3lmemhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTk1NDQsImV4cCI6MjA5NDIzNTU0NH0.nppfcWnBeKguSGGNfq3ZBWgHp6P1r-ztuze2xlaCpas";

const supabase =
window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function register(){

    const username =
    document.getElementById("username").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const { data, error } =
    await supabase.auth.signUp({

        email,
        password,

        options:{

            data:{
                username: username
            },

            emailRedirectTo:
            "https://openxp-automotive.github.io/login.html"
        }
    });

    if(error){

        alert(error.message);
        return;
    }

    alert(
        "Verification email sent! Check your inbox."
    );

    window.location.href =
    "login.html";
}

</script>

</body>
</html>
